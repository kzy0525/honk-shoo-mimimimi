<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Drowsiness Detector</h2>

    <div class="status-row">
      <span class="dot" id="dot">●</span>
      <span id="status-text">Loading…</span>
    </div>

    <div class="score-display" id="score">--</div>

    <div class="bar-track">
      <div class="bar-fill" id="bar"></div>
    </div>
    <div class="bar-label">DROWSINESS</div>

    <div class="metrics" id="metrics">
      <div class="metric-row"><span>Left EAR</span><span id="m-lear">--</span></div>
      <div class="metric-row"><span>Right EAR</span><span id="m-rear">--</span></div>
      <div class="metric-row"><span>MAR</span><span id="m-mar">--</span></div>
      <div class="metric-row"><span>Head tilt</span><span id="m-head">--</span></div>
      <div class="metric-row"><span>Blink dur</span><span id="m-blink">--</span></div>
      <div class="metric-row"><span>Yawns / 5m</span><span id="m-yawn">--</span></div>
    </div>

    <label class="toggle-row">
      <input type="checkbox" id="toggle" checked>
      <span>Monitoring active</span>
    </label>

    <button id="debug-btn">Open Debug View</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
