<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drowsiness Detector — Debug View</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    header {
      width: 100%;
      padding: 10px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 14px; color: #ccc; font-weight: 500; }
    header .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1a3a1a;
      color: #00dc00;
    }
    #canvas-wrap {
      position: relative;
      margin-top: 16px;
    }
    canvas {
      display: block;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      max-width: 100vw;
    }
    #no-camera {
      display: none;
      margin-top: 40px;
      color: #dc0000;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Drowsiness Detector — Debug View</h1>
    <span class="badge" id="header-badge">Loading…</span>
  </header>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="no-camera">Camera access denied or unavailable.</div>
  <!-- Hidden video source -->
  <video id="video" playsinline style="display:none" width="640" height="480"></video>
  <script src="vendor/face_mesh.js"></script>
  <script src="detection.js"></script>
  <script src="debug.js"></script>
</body>
</html>
